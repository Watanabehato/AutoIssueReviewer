name: Python checks

on:
  push:
    paths:
      - 'auto_issue/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'auto_issue/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/python.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install test dependencies
        run: python -m pip install '.[test]'
      - name: Lint
        run: ruff check auto_issue tests
      - name: Test
        run: python -m pytest --cov=auto_issue --cov-report=term-missing
